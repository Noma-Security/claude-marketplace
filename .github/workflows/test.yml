name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint hook scripts and test helpers
        run: shellcheck -x -P SCRIPTDIR guardrails/scripts/*.sh tests/test_helper.bash

  test:
    name: bats (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -q && sudo apt-get install -y bats
          else
            brew install bats-core
          fi

      - name: Run tests
        run: bats tests/
        env:
          # macOS users run the hooks with the stock /bin/bash (3.2) — test
          # exactly that instead of the runner's brew-installed bash 5
          NOMA_TEST_SHELL: ${{ matrix.os == 'macos-latest' && '/bin/bash' || '' }}
