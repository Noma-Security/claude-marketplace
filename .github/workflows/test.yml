name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint hook scripts and test helpers
        run: shellcheck -x -P SCRIPTDIR common/*.sh scripts/*.sh guardrails/scripts/*.sh guardrails/scripts/common/*.sh tests/test_helper.bash

  common-sync:
    name: common vendored copies in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check vendored common/ has no drift
        run: ./scripts/sync-common.sh --check

  python:
    name: python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every Python 3 the official images provide — the inventory is written
        # to run on all of them (stdlib only, no f-strings/dataclasses). checkout
        # runs on the host so old images lacking modern node/git are no problem;
        # the suite runs inside the version-pinned image via docker.
        python-version: ['3.6', '3.7', '3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - name: py_compile + unittest under python ${{ matrix.python-version }}
        # Same script devs run locally — one source of truth for how the suite
        # is compiled and run; the matrix above just fans the versions out in
        # parallel (checkout stays on the host, docker runs the pinned image).
        run: ./scripts/test-python-matrix.sh "${{ matrix.python-version }}"

  test:
    name: bats (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -q && sudo apt-get install -y bats
          else
            brew install bats-core
          fi

      - name: Run tests
        run: bats tests/
        env:
          # macOS users run the hooks with the stock /bin/bash (3.2) — test
          # exactly that instead of the runner's brew-installed bash 5
          NOMA_TEST_SHELL: ${{ matrix.os == 'macos-latest' && '/bin/bash' || '' }}
